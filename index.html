<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>İzliyos — Canlı TV</title>
<meta name="description" content="İzliyos · Dünyanın canlı TV kanalları. Ara, keşfet, izle.">
<meta name="theme-color" content="#0A0A12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://iptv-org.github.io">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236E56F8'/%3E%3Cstop offset='1' stop-color='%23FF4D6D'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='1' y='1' width='30' height='30' rx='9' fill='url(%23g)'/%3E%3Cg fill='white'%3E%3Crect x='9' y='13' width='3.4' height='10' rx='1.7'/%3E%3Crect x='14.3' y='9' width='3.4' height='14' rx='1.7'/%3E%3Crect x='19.6' y='16' width='3.4' height='7' rx='1.7'/%3E%3C/g%3E%3C/svg%3E">
<style>
/* ============================================================
   İzliyos — design tokens
   Personality lives in: the animated equalizer logo, the violet→coral
   signal accent, and a TV-grade focus system. Everything else stays quiet.
   ============================================================ */
:root{
  --bg:#0A0A12; --bg-elev:#14141E; --bg-sunken:#1C1C28; --bg-hover:#23232f;
  --text:#F4F4F8; --text-dim:#A0A0B0; --text-faint:#65657A;
  --hair:rgba(255,255,255,.09); --hair-strong:rgba(255,255,255,.16);
  --accent:#8B6CFF; --accent-2:#A78BFA; --accent-soft:rgba(139,108,255,.16);
  --live:#FF4D6D; --live-soft:rgba(255,77,109,.16);
  --warn:#FFB340; --warn-soft:rgba(255,159,10,.16);
  --grad:linear-gradient(135deg,#6E56F8,#FF4D6D);
  --shadow:0 1px 2px rgba(0,0,0,.5),0 12px 36px rgba(0,0,0,.5);
  --shadow-lg:0 24px 70px rgba(0,0,0,.7),0 6px 16px rgba(0,0,0,.5);
  --r:18px; --r-sm:13px; --r-xs:9px;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --display:"Space Grotesk","Inter",-apple-system,sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code","Roboto Mono",Menlo,monospace;
  --maxw:1220px;
  --bar-h:62px;
}
[data-theme="light"]{
  --bg:#F6F6FA; --bg-elev:#FFFFFF; --bg-sunken:#EDEDF2; --bg-hover:#E6E6EE;
  --text:#15151D; --text-dim:#5C5C6B; --text-faint:#9696A6;
  --hair:rgba(20,20,30,.09); --hair-strong:rgba(20,20,30,.15);
  --accent:#5B45E0; --accent-2:#7C5CFF; --accent-soft:rgba(91,69,224,.10);
  --live:#FF3B5C; --live-soft:rgba(255,59,92,.10);
  --warn:#B25000; --warn-soft:rgba(255,149,0,.14);
  --shadow:0 1px 2px rgba(20,20,40,.05),0 10px 30px rgba(20,20,40,.07);
  --shadow-lg:0 18px 56px rgba(20,20,40,.16),0 4px 12px rgba(20,20,40,.1);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.45;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;transition:background .4s,color .4s;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
input{font-family:inherit}
a{color:var(--accent);text-decoration:none}
::selection{background:var(--accent-soft)}
.hidden{display:none!important}

/* ---------- App bar ---------- */
.bar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 72%,transparent);
  backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);
  border-bottom:1px solid var(--hair)}
.bar-in{max-width:var(--maxw);margin:0 auto;height:var(--bar-h);padding:0 20px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:11px;flex-shrink:0;cursor:pointer;user-select:none;padding:4px;margin:-4px;border-radius:12px}
.logo-mark{width:30px;height:30px;display:block;flex-shrink:0}
.logo-mark .eq rect{transform-box:fill-box;transform-origin:bottom;animation:eq 1.4s ease-in-out infinite}
.logo-mark .b2{animation-delay:.18s} .logo-mark .b3{animation-delay:.36s}
@keyframes eq{0%,100%{transform:scaleY(.55)}50%{transform:scaleY(1)}}
.logo-word{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.03em;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.bar-spacer{flex:1}
.search{position:relative;flex:1;max-width:400px;min-width:0}
.search input{width:100%;border:1px solid var(--hair-strong);background:var(--bg-elev);color:var(--text);
  border-radius:980px;padding:10px 38px 10px 40px;font-size:14.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.search input::placeholder{color:var(--text-faint)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.search .s-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-faint);pointer-events:none}
.search .s-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;
  display:none;place-items:center;border-radius:50%;color:var(--text-faint)}
.search .s-clear:hover{background:var(--bg-sunken);color:var(--text)}
.search.has .s-clear{display:grid}
.ic-btn{width:40px;height:40px;display:grid;place-items:center;flex-shrink:0;border:1px solid var(--hair-strong);
  background:var(--bg-elev);border-radius:12px;transition:background .16s,transform .1s,color .16s}
.ic-btn:hover{background:var(--bg-hover)}
.ic-btn:active{transform:scale(.93)}
.ic-btn.on{color:var(--live);border-color:var(--live);background:var(--live-soft)}
.lang-btn{width:auto;padding:0 13px;font-weight:600;font-size:13px;font-family:var(--mono)}

/* ---------- Layout ---------- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:22px 20px 110px}
.crumbs{display:flex;align-items:center;gap:9px;min-height:36px;margin-bottom:14px;flex-wrap:wrap}
.crumb-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hair);background:var(--bg-elev);
  border-radius:980px;padding:7px 14px 7px 11px;font-size:13.5px;font-weight:550;transition:background .16s,border-color .16s}
.crumb-btn:hover{background:var(--bg-hover);border-color:var(--hair-strong)}
.crumb-here{display:flex;align-items:center;gap:9px;font-size:15.5px;font-weight:650}
.crumb-here .flag{font-size:21px}
.crumb-sep{color:var(--text-faint)}

/* ---------- Hero ---------- */
.hero{position:relative;overflow:hidden;border-radius:24px;padding:42px 34px;margin-bottom:26px;
  border:1px solid var(--hair);background:var(--bg-elev)}
.hero .glow{position:absolute;inset:-40%;z-index:0;pointer-events:none;opacity:.9;filter:blur(60px)}
.hero .glow::before,.hero .glow::after{content:"";position:absolute;width:46%;height:70%;border-radius:50%}
.hero .glow::before{left:6%;top:10%;background:radial-gradient(circle,rgba(110,86,248,.55),transparent 65%);animation:float1 14s ease-in-out infinite}
.hero .glow::after{right:4%;bottom:0%;background:radial-gradient(circle,rgba(255,77,109,.45),transparent 65%);animation:float2 17s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(8%,12%)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-10%,-8%)}}
.hero-in{position:relative;z-index:1}
.hero .kicker{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11.5px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px}
.hero .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 2.2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 var(--live)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
.hero h1{font-family:var(--display);font-size:clamp(28px,4.6vw,46px);line-height:1.04;letter-spacing:-.03em;margin:0 0 12px;font-weight:700}
.hero p{margin:0;color:var(--text-dim);font-size:16px;max-width:56ch}
.hero-stats{display:flex;gap:26px;margin-top:22px;flex-wrap:wrap}
.hstat{display:flex;flex-direction:column;line-height:1.1}
.hstat b{font-family:var(--mono);font-size:23px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.hstat span{font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}

/* ---------- Section + rails ---------- */
.section{margin-bottom:30px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-head h2{font-family:var(--display);font-size:18px;font-weight:650;letter-spacing:-.01em;margin:0}
.sec-head .ic{color:var(--accent)}
.sec-head .count{font-family:var(--mono);font-size:12.5px;color:var(--text-faint);margin-left:auto}

.rail{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 12px;scrollbar-width:thin;scroll-snap-type:x proximity}
.rail::-webkit-scrollbar{height:7px}.rail::-webkit-scrollbar-thumb{background:var(--hair-strong);border-radius:10px}
.mini{flex-shrink:0;width:150px;scroll-snap-align:start;display:flex;flex-direction:column;gap:9px;text-align:left;
  border:1px solid var(--hair);background:var(--bg-elev);border-radius:var(--r-sm);padding:11px;transition:transform .14s,box-shadow .2s,border-color .2s;box-shadow:var(--shadow)}
.mini:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--hair-strong)}
.mini .m-logo{width:100%;aspect-ratio:16/10;border-radius:9px;overflow:hidden;display:grid;place-items:center;background:var(--bg-sunken);border:1px solid var(--hair)}
.mini .m-logo img{width:100%;height:100%;object-fit:contain;padding:8px}
.mini .m-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- Popular country chips ---------- */
.pops{display:flex;gap:9px;flex-wrap:wrap;margin-top:20px}
.pop{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--hair-strong);background:var(--bg-elev);
  border-radius:980px;padding:8px 15px 8px 12px;font-size:13.5px;font-weight:550;transition:transform .12s,background .16s,border-color .16s}
.pop:hover{background:var(--bg-hover);transform:translateY(-1px)}
.pop .flag{font-size:18px}
.pop .n{font-family:var(--mono);font-size:11px;color:var(--text-faint)}

/* ---------- Category chips ---------- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:3px 2px 16px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;border:1px solid var(--hair-strong);background:var(--bg-elev);border-radius:980px;
  padding:8px 15px;font-size:13px;font-weight:550;white-space:nowrap;color:var(--text-dim);transition:all .15s}
.chip:hover{background:var(--bg-hover);color:var(--text)}
.chip[aria-pressed="true"]{background:var(--text);color:var(--bg);border-color:var(--text)}

/* ---------- Country grid ---------- */
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(166px,1fr));gap:13px}
.country-card{display:flex;flex-direction:column;align-items:flex-start;text-align:left;position:relative;overflow:hidden;
  border:1px solid var(--hair);background:var(--bg-elev);border-radius:var(--r);padding:17px 17px 15px;
  box-shadow:var(--shadow);transition:transform .14s,box-shadow .22s,border-color .2s}
.country-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--hair-strong)}
.country-card .flag{font-size:36px;line-height:1;margin-bottom:11px}
.country-card .c-name{font-weight:600;font-size:15px;letter-spacing:-.01em}
.country-card .c-count{font-family:var(--mono);font-size:12px;color:var(--text-dim);margin-top:2px}
.country-card .c-code{position:absolute;top:14px;right:15px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.05em;color:var(--text-faint)}

/* ---------- Channel grid ---------- */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:13px}
.card{display:flex;align-items:center;gap:13px;text-align:left;width:100%;position:relative;
  border:1px solid var(--hair);background:var(--bg-elev);border-radius:var(--r-sm);padding:13px;
  box-shadow:var(--shadow);transition:transform .14s,box-shadow .22s,border-color .2s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--hair-strong)}
.card-logo{width:54px;height:54px;border-radius:13px;flex-shrink:0;overflow:hidden;display:grid;place-items:center;background:var(--bg-sunken);border:1px solid var(--hair)}
.card-logo img{width:100%;height:100%;object-fit:contain;padding:6px}
.initials{width:100%;height:100%;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:18px;color:#fff;letter-spacing:-.03em}
.card-body{min-width:0;flex:1}
.card-name{font-weight:600;font-size:14.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px}
.card-sub{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.02em;padding:2px 6px;border-radius:6px;
  background:var(--bg-sunken);color:var(--text-dim);border:1px solid var(--hair);text-transform:uppercase}
.badge.cat{font-family:var(--sans);letter-spacing:0;font-weight:550;text-transform:capitalize}
.badge.warnb{background:var(--warn-soft);color:var(--warn);border-color:transparent}
.card-live{position:absolute;top:11px;right:12px;display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8.5px;font-weight:700;letter-spacing:.08em;color:var(--live)}
.fav-btn{position:absolute;bottom:11px;right:11px;width:26px;height:26px;display:grid;place-items:center;border-radius:50%;
  color:var(--text-faint);background:transparent;transition:color .15s,background .15s,transform .1s}
.fav-btn:hover{background:var(--bg-sunken);color:var(--text)}
.fav-btn.on{color:var(--live)}
.fav-btn:active{transform:scale(.85)}

.more-btn{display:block;margin:24px auto 0;border:1px solid var(--hair-strong);background:var(--bg-elev);border-radius:980px;
  padding:12px 28px;font-size:14px;font-weight:600;transition:background .16s}
.more-btn:hover{background:var(--bg-hover)}

/* ---------- States ---------- */
.state{text-align:center;padding:76px 20px;color:var(--text-dim)}
.state .ring{width:36px;height:36px;border:3px solid var(--hair-strong);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.state .emoji{font-size:42px;margin-bottom:14px}
.state h3{color:var(--text);font-size:19px;margin:0 0 6px;font-weight:650;font-family:var(--display)}
.state p{margin:0 auto;max-width:42ch;font-size:14.5px}
.state .prog{font-family:var(--mono);font-size:12px;color:var(--text-faint);margin-top:16px}

/* ---------- Player ---------- */
.scrim{position:fixed;inset:0;z-index:70;display:none;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:22px;overflow-y:auto}
.scrim.open{display:flex;align-items:center;justify-content:center}
.player{width:100%;max-width:960px;background:var(--bg-elev);border:1px solid var(--hair);border-radius:22px;
  box-shadow:var(--shadow-lg);overflow:hidden;animation:rise .3s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
.video-wrap{position:relative;background:#000;aspect-ratio:16/9;width:100%}
.video-wrap video{width:100%;height:100%;display:block;background:#000}
.v-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:13px;text-align:center;padding:26px;color:#fff;background:rgba(0,0,0,.6)}
.v-overlay.show{display:flex}
.v-overlay .ring{width:32px;height:32px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
.v-overlay .emoji{font-size:36px}
.v-overlay h4{margin:0;font-size:16.5px;font-weight:650}
.v-overlay p{margin:0;font-size:13.5px;color:rgba(255,255,255,.82);max-width:40ch;line-height:1.5}
.v-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.v-actions button{border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.1);color:#fff;border-radius:980px;padding:9px 17px;font-size:13px;font-weight:600;transition:background .16s}
.v-actions button:hover{background:rgba(255,255,255,.22)}
.v-actions button.primary{background:#fff;color:#000;border-color:#fff}

.p-head{display:flex;align-items:center;gap:13px;padding:15px 18px 6px}
.p-logo{width:48px;height:48px;border-radius:12px;flex-shrink:0;overflow:hidden;display:grid;place-items:center;background:var(--bg-sunken);border:1px solid var(--hair)}
.p-logo img{width:100%;height:100%;object-fit:contain;padding:6px}
.p-title{flex:1;min-width:0}
.p-title h2{margin:0;font-family:var(--display);font-size:19px;font-weight:650;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-title .p-meta{font-size:13px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-tools{display:flex;gap:7px;flex-shrink:0}
.p-tool{width:38px;height:38px;border-radius:11px;background:var(--bg-sunken);display:grid;place-items:center;transition:background .15s,color .15s}
.p-tool:hover{background:var(--bg-hover)}
.p-tool.on{color:var(--live)}
.p-close{width:38px;height:38px;border-radius:50%;background:var(--bg-sunken);display:grid;place-items:center;flex-shrink:0;transition:background .15s}
.p-close:hover{background:var(--hair-strong)}

.zap{display:flex;align-items:center;gap:10px;padding:8px 18px 2px}
.zap button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--hair-strong);
  background:var(--bg);border-radius:11px;padding:10px;font-size:13px;font-weight:600;transition:background .15s,border-color .15s}
.zap button:hover{background:var(--bg-hover);border-color:var(--accent)}

.sources{padding:12px 18px 18px}
.sources-label{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-faint);font-weight:650;margin-bottom:9px}
.src-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.src-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-start;gap:3px;border:1px solid var(--hair-strong);
  background:var(--bg);border-radius:11px;padding:9px 13px;transition:all .15s;min-width:98px}
.src-chip:hover{border-color:var(--accent)}
.src-chip[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-soft)}
.src-chip .q{font-family:var(--mono);font-weight:700;font-size:13px}
.src-chip .l{font-size:11px;color:var(--text-dim)}

/* ---------- Footer / toast ---------- */
footer{border-top:1px solid var(--hair);max-width:var(--maxw);margin:0 auto;padding:24px 20px 44px;color:var(--text-faint);font-size:12.5px;line-height:1.6;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
footer .fbrand{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:700;color:var(--text-dim)}
footer .fbrand svg{width:18px;height:18px}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);
  padding:11px 21px;border-radius:980px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .26s;z-index:90}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Focus (TV / keyboard) ---------- */
[data-focus]:focus-visible{outline:none;box-shadow:0 0 0 3px var(--bg),0 0 0 6px var(--accent);border-radius:var(--r-sm)}
.country-card[data-focus]:focus-visible,.hero [data-focus]:focus-visible{border-radius:var(--r)}
[data-focus]:focus-visible{transform:translateY(-3px)}
.search input:focus-visible{outline:none}

/* ---------- Responsive: mobile ---------- */
@media (max-width:600px){
  body{font-size:14.5px}
  .wrap{padding:16px 13px 100px}
  .bar-in{padding:0 13px;gap:9px;height:56px}
  :root{--bar-h:56px}
  .logo-word{font-size:18px}
  .hero{padding:28px 20px;border-radius:20px}
  .hero p{font-size:14.5px}
  .hero-stats{gap:18px}
  .country-grid{grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
  .country-card{padding:14px 13px 12px}.country-card .flag{font-size:30px}
  .ch-grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{flex-direction:column;align-items:flex-start;gap:10px;padding:12px}
  .card-logo{width:46px;height:46px}
  .card-name{padding-right:0;white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .scrim{padding:0}.player{border-radius:0;max-width:100%;min-height:100%}
  .search{order:5;flex-basis:100%;max-width:none}
  .bar-in{flex-wrap:wrap;height:auto;padding:10px 13px}
}
/* ---------- Responsive: big screen / TV (10-foot) ---------- */
@media (min-width:1500px){
  :root{--maxw:1480px}
  body{font-size:16px}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
  .country-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px}
  .card-logo{width:62px;height:62px}
  .hero{padding:56px 46px}
  [data-focus]:focus-visible{box-shadow:0 0 0 4px var(--bg),0 0 0 9px var(--accent)}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>

<header class="bar">
  <div class="bar-in">
    <div class="brand" id="brand" data-focus tabindex="0" role="button" aria-label="İzliyos — ana sayfa">
      <svg class="logo-mark" viewBox="0 0 32 32" aria-hidden="true">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6E56F8"/><stop offset="1" stop-color="#FF4D6D"/></linearGradient></defs>
        <rect x="1" y="1" width="30" height="30" rx="9" fill="url(#lg)"/>
        <g class="eq" fill="#fff">
          <rect class="b1" x="9" y="13" width="3.4" height="10" rx="1.7"/>
          <rect class="b2" x="14.3" y="9" width="3.4" height="14" rx="1.7"/>
          <rect class="b3" x="19.6" y="16" width="3.4" height="7" rx="1.7"/>
        </g>
      </svg>
      <span class="logo-word">İzliyos</span>
    </div>

    <div class="search" id="searchBox">
      <svg class="s-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" autocomplete="off" spellcheck="false" placeholder="Kanal ara…" aria-label="Ara">
      <button class="s-clear" id="sClear" data-focus tabindex="-1" aria-label="Temizle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>

    <div class="bar-spacer"></div>

    <button class="ic-btn" id="favBtn" data-focus title="Favoriler" aria-label="Favoriler">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="m12 17.3-6.2 3.6 1.7-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.5 4.7 1.7 7z"/></svg>
    </button>
    <button class="ic-btn lang-btn" id="langBtn" data-focus title="Language">TR</button>
    <button class="ic-btn" id="themeBtn" data-focus title="Tema" aria-label="Tema">
      <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg id="moonIcon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>
</header>

<main class="wrap">
  <nav class="crumbs" id="crumbs"></nav>
  <div id="content">
    <div class="state">
      <div class="ring"></div>
      <h3 id="loadT">Yayın verileri yükleniyor</h3>
      <p id="loadD">Ülkeler, kanallar ve canlı yayın bağlantıları hazırlanıyor.</p>
      <div class="prog" id="prog"></div>
    </div>
  </div>
</main>

<footer id="footer"></footer>

<div class="scrim" id="scrim" role="dialog" aria-modal="true" aria-label="Oynatıcı">
  <div class="player">
    <div class="video-wrap">
      <video id="video" playsinline controls></video>
      <div class="v-overlay" id="vOverlay">
        <div id="vSpin" class="ring"></div>
        <div id="vEmoji" class="emoji hidden"></div>
        <h4 id="vTitle"></h4>
        <p id="vDesc"></p>
        <div class="v-actions" id="vActions"></div>
      </div>
    </div>
    <div class="p-head">
      <div class="p-logo" id="pLogo"></div>
      <div class="p-title"><h2 id="pName"></h2><div class="p-meta" id="pMeta"></div></div>
      <div class="p-tools">
        <button class="p-tool" id="pFav" data-focus title="Favori" aria-label="Favori"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="m12 17.3-6.2 3.6 1.7-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.5 4.7 1.7 7z"/></svg></button>
        <button class="p-tool" id="pPip" data-focus title="Mini ekran" aria-label="Mini ekran"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="14" rx="2"/><rect x="12" y="11" width="7" height="5" rx="1" fill="currentColor"/></svg></button>
        <button class="p-tool" id="pFull" data-focus title="Tam ekran" aria-label="Tam ekran"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
      </div>
      <button class="p-close" id="pClose" data-focus aria-label="Kapat"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="zap" id="zap"></div>
    <div class="sources" id="sources"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script>
"use strict";
/* ===================== Config & i18n ===================== */
const API="https://iptv-org.github.io/api";
const LIMIT=200, SHOW_NSFW=false, POPULAR=["TR","US","GB","DE","FR","AZ","NL","RU","IT","ES"];
const T={
 tr:{
  searchPh:"Kanal ara…", searchAllPh:"Tüm kanallarda ara…",
  loadT:"Yayın verileri yükleniyor", loadD:"Ülkeler, kanallar ve canlı yayın bağlantıları hazırlanıyor.",
  heroKick:"Canlı yayında", heroT:"Ne izlesek?", heroD:"Dünyanın dört bir yanından binlerce canlı kanal. Bir ülke seç, ara ve hemen izlemeye başla.",
  sCountries:"Ülke", sChannels:"Kanal", sStreams:"Yayın",
  popular:"Popüler", browse:"Ülkeye göre keşfet", recents:"Kaldığın yer", favorites:"Favoriler",
  searchCh:"Kanallar", searchCo:"Ülkeler", searchEmptyT:"Sonuç yok", searchEmptyD:"Aramaya uyan kanal veya ülke bulunamadı.",
  chCount:n=>`${n} kanal`, back:"Ülkeler", allCats:"Tümü",
  countrySub:n=>`${n} canlı kanal`, live:"CANLI",
  noChT:"Kanal yok", noChD:"Aramayı veya kategori filtresini değiştir.",
  favEmptyT:"Henüz favori yok", favEmptyD:"Kanal kartındaki yıldıza dokunarak favorilerine ekle.",
  loadMore:"Daha fazla", sources:"Yayın kaynağı", geo:"Coğrafi engel",
  starting:"Yayın açılıyor…", errT:"Yayın açılamadı",
  errD:"Kaynak coğrafi engelli olabilir veya tarayıcıda oynatılamayan bir biçimde olabilir. Başka bir kaynağı dene ya da bağlantıyı bir oynatıcıda aç.",
  httpD:"Bu kaynak güvensiz (http) bağlantı kullanıyor; tarayıcı engelliyor olabilir. Bağlantıyı kopyalayıp VLC gibi bir oynatıcıda açabilirsin.",
  retry:"Tekrar dene", nextSrc:"Sonraki kaynak", copy:"Bağlantıyı kopyala", copied:"Bağlantı kopyalandı",
  prevCh:"Önceki", nextCh:"Sonraki", added:"Favorilere eklendi", removed:"Favorilerden çıkarıldı",
  pipErr:"Mini ekran bu cihazda desteklenmiyor", noStream:"Yayın bulunamadı",
  loadErrT:"Veriler yüklenemedi", loadErrD:"Bağlantını kontrol edip sayfayı yenile.",
  intl:"Uluslararası", foot:"Tüm yayınlar herkese açık bağlantılardır; içerikler bu sitede barındırılmaz."
 },
 en:{
  searchPh:"Search channels…", searchAllPh:"Search all channels…",
  loadT:"Loading broadcast data", loadD:"Preparing countries, channels and live stream links.",
  heroKick:"On air now", heroT:"What’s on?", heroD:"Thousands of live channels from around the world. Pick a country, search, and start watching instantly.",
  sCountries:"Countries", sChannels:"Channels", sStreams:"Streams",
  popular:"Popular", browse:"Browse by country", recents:"Jump back in", favorites:"Favorites",
  searchCh:"Channels", searchCo:"Countries", searchEmptyT:"No results", searchEmptyD:"No channel or country matches your search.",
  chCount:n=>`${n} channels`, back:"Countries", allCats:"All",
  countrySub:n=>`${n} live channels`, live:"LIVE",
  noChT:"No channels", noChD:"Try a different search or category.",
  favEmptyT:"No favorites yet", favEmptyD:"Tap the star on any channel card to save it here.",
  loadMore:"Show more", sources:"Source", geo:"Geo-blocked",
  starting:"Starting stream…", errT:"Couldn’t play stream",
  errD:"The source may be geo-restricted or in a format the browser can’t play. Try another source or open the link in a player.",
  httpD:"This source uses an insecure (http) link the browser may block. Copy the link and open it in a player like VLC.",
  retry:"Retry", nextSrc:"Next source", copy:"Copy link", copied:"Link copied",
  prevCh:"Previous", nextCh:"Next", added:"Added to favorites", removed:"Removed from favorites",
  pipErr:"Picture-in-picture isn’t supported here", noStream:"No stream found",
  loadErrT:"Couldn’t load data", loadErrD:"Check your connection and refresh.",
  intl:"International", foot:"All streams are publicly available links; no content is hosted on this site."
 }
};

/* ===================== State ===================== */
const S={
 lang: localStorage.getItem("izl:lang") || ((navigator.language||"").toLowerCase().startsWith("tr")?"tr":"en"),
 theme: localStorage.getItem("izl:theme") || "dark",
 countries:{}, channels:{}, streamsByCh:{}, logoByCh:{}, byCountry:{}, catsByCountry:{},
 view:"home", country:null, cat:"all", q:"", renderCount:LIMIT,
 fav:new Set(JSON.parse(localStorage.getItem("izl:fav")||"[]")),
 recents:JSON.parse(localStorage.getItem("izl:recents")||"[]"),
 lastList:[]
};
const t=k=>T[S.lang][k];
const $=s=>document.querySelector(s);

/* ===================== Boot ===================== */
applyTheme(); applyLang();
$("#brand").addEventListener("click",goHome);
$("#favBtn").addEventListener("click",()=>{S.view="favorites";S.q="";$("#search").value="";syncSearch();scrollTo({top:0});render();});
$("#themeBtn").addEventListener("click",()=>{S.theme=S.theme==="dark"?"light":"dark";localStorage.setItem("izl:theme",S.theme);applyTheme();});
$("#langBtn").addEventListener("click",()=>{S.lang=S.lang==="tr"?"en":"tr";localStorage.setItem("izl:lang",S.lang);applyLang();render();});
$("#search").addEventListener("input",debounce(e=>{S.q=e.target.value.trim().toLowerCase();S.renderCount=LIMIT;syncSearch();render();},170));
$("#sClear").addEventListener("click",()=>{$("#search").value="";S.q="";S.renderCount=LIMIT;syncSearch();render();$("#search").focus();});
$("#pClose").addEventListener("click",closePlayer);
$("#scrim").addEventListener("click",e=>{if(e.target===$("#scrim"))closePlayer();});
$("#pFav").addEventListener("click",()=>toggleFav(curChannel?.id,true));
$("#pPip").addEventListener("click",togglePip);
$("#pFull").addEventListener("click",toggleFull);

// delegated clicks (cards, stars, chips, etc.)
$("#content").addEventListener("click",e=>{
  const f=e.target.closest("[data-fav]"); if(f){e.stopPropagation();toggleFav(f.dataset.fav);return;}
  const card=e.target.closest(".card,.mini"); if(card){openPlayer(card.dataset.id);return;}
  const co=e.target.closest(".country-card,.pop"); if(co){enterCountry(co.dataset.code);return;}
  const chip=e.target.closest(".chip"); if(chip){S.cat=chip.dataset.cat;S.renderCount=LIMIT;render();return;}
  const more=e.target.closest(".more-btn"); if(more){S.renderCount+=LIMIT;render();}
});
$("#crumbs").addEventListener("click",e=>{const b=e.target.closest("[data-act]");if(b&&b.dataset.act==="back")goHome();});

setupSpatialNav();
loadData();

/* ===================== Theme / language ===================== */
function applyTheme(){document.documentElement.setAttribute("data-theme",S.theme);
  $("#sunIcon").classList.toggle("hidden",S.theme==="dark");$("#moonIcon").classList.toggle("hidden",S.theme!=="dark");
  document.querySelector('meta[name=theme-color]').setAttribute("content",S.theme==="dark"?"#0A0A12":"#F6F6FA");}
function applyLang(){document.documentElement.lang=S.lang;$("#langBtn").textContent=S.lang.toUpperCase();
  $("#loadT").textContent=t("loadT");$("#loadD").textContent=t("loadD");syncSearch();
  $("#footer").innerHTML=`<span class="fbrand"><svg viewBox="0 0 32 32"><rect x="1" y="1" width="30" height="30" rx="9" fill="url(#lg)"/></svg>İzliyos</span><span>·</span><span>${t("foot")}</span>`;}
function syncSearch(){const i=$("#search");i.placeholder=S.view==="country"?t("searchPh"):t("searchAllPh");
  $("#searchBox").classList.toggle("has",!!i.value);}

/* ===================== Data ===================== */
async function loadData(){
  const prog=$("#prog");
  try{
    prog.textContent="countries · channels · streams";
    const [countries,channels,streams]=await Promise.all([
      fetchJSON(`${API}/countries.json`),fetchJSON(`${API}/channels.json`),fetchJSON(`${API}/streams.json`)]);
    countries.forEach(c=>S.countries[c.code]=c);
    channels.forEach(ch=>{if(!SHOW_NSFW&&ch.is_nsfw)return;if(ch.closed)return;S.channels[ch.id]=ch;});
    streams.forEach(st=>{if(!st.channel||!S.channels[st.channel])return;(S.streamsByCh[st.channel]||=[]).push(st);});
    for(const id in S.streamsByCh){
      const ch=S.channels[id]; const code=ch.country&&S.countries[ch.country]?ch.country:"_INT";
      (S.byCountry[code]||=[]).push(id);(S.catsByCountry[code]||=new Set());(ch.categories||[]).forEach(c=>S.catsByCountry[code].add(c));
    }
    if(S.byCountry._INT)S.countries._INT={code:"_INT",name:t("intl"),flag:"🌐"};
    for(const code in S.byCountry)S.byCountry[code].sort((a,b)=>S.channels[a].name.localeCompare(S.channels[b].name));
    render();
    prog.textContent="logos";
    fetchJSON(`${API}/logos.json`).then(logos=>{logos.forEach(l=>{if(!l.url)return;if(!S.logoByCh[l.channel]||l.in_use)S.logoByCh[l.channel]=l.url;});render();}).catch(()=>{});
  }catch(err){
    $("#content").innerHTML=`<div class="state"><div class="emoji">📡</div><h3>${t("loadErrT")}</h3><p>${t("loadErrD")}</p><p class="prog">${esc(String(err.message||err))}</p></div>`;
  }
}
async function fetchJSON(u){const r=await fetch(u,{cache:"force-cache"});if(!r.ok)throw new Error(`${u.split("/").pop()} → HTTP ${r.status}`);return r.json();}

/* ===================== Navigation ===================== */
function goHome(){S.view="home";S.country=null;S.q="";S.renderCount=LIMIT;$("#search").value="";syncSearch();scrollTo({top:0});render();}
function enterCountry(code){S.view="country";S.country=code;S.cat="all";S.q="";S.renderCount=LIMIT;$("#search").value="";syncSearch();scrollTo({top:0});render();}

/* ===================== Render ===================== */
function render(){
  $("#favBtn").classList.toggle("on",S.view==="favorites");
  if(S.view==="home")renderHome();
  else if(S.view==="country")renderCountry();
  else renderFavorites();
}

function renderHome(){
  $("#crumbs").innerHTML="";
  const totalCh=Object.keys(S.streamsByCh).length;
  const totalStr=Object.values(S.streamsByCh).reduce((a,b)=>a+b.length,0);
  const hero=`<div class="hero"><div class="glow"></div><div class="hero-in">
      <div class="kicker"><span class="dot"></span>${t("heroKick")}</div>
      <h1>${t("heroT")}</h1><p>${t("heroD")}</p>
      <div class="hero-stats">
        <div class="hstat"><b>${Object.keys(S.byCountry).length}</b><span>${t("sCountries")}</span></div>
        <div class="hstat"><b>${fmt(totalCh)}</b><span>${t("sChannels")}</span></div>
        <div class="hstat"><b>${fmt(totalStr)}</b><span>${t("sStreams")}</span></div>
      </div>
      ${S.q?"":`<div class="pops">${popularChips()}</div>`}
  </div></div>`;

  if(S.q){ $("#content").innerHTML=hero+searchResults(); afterRender(); return; }

  let body="";
  // rails
  const recents=S.recents.filter(id=>S.channels[id]).slice(0,14);
  if(recents.length) body+=railSection("recents",t("recents"),icPlay(),recents);
  const favs=[...S.fav].filter(id=>S.channels[id]).slice(0,14);
  if(favs.length) body+=railSection("favs",t("favorites"),icStar(),favs);
  // country grid
  body+=`<div class="section"><div class="sec-head"><span class="ic">${icGlobe()}</span><h2>${t("browse")}</h2></div>${countryGrid(countryList())}</div>`;
  $("#content").innerHTML=hero+body; afterRender();
}

function searchResults(){
  const q=S.q;
  const cos=countryList().filter(x=>x.c.name.toLowerCase().includes(q)||x.code.toLowerCase().includes(q));
  let chIds=[];
  for(const id in S.streamsByCh){const ch=S.channels[id];
    if(ch.name.toLowerCase().includes(q)||(ch.alt_names||[]).some(n=>n.toLowerCase().includes(q)))chIds.push(id);}
  chIds.sort((a,b)=>S.channels[a].name.localeCompare(S.channels[b].name));
  S.lastList=chIds;
  if(!chIds.length&&!cos.length) return `<div class="state"><div class="emoji">🔍</div><h3>${t("searchEmptyT")}</h3><p>${t("searchEmptyD")}</p></div>`;
  let h="";
  if(chIds.length){const shown=chIds.slice(0,S.renderCount);
    h+=`<div class="section"><div class="sec-head"><span class="ic">${icTv()}</span><h2>${t("searchCh")}</h2><span class="count">${fmt(chIds.length)}</span></div>
        <div class="ch-grid">${shown.map(channelCard).join("")}</div>
        ${chIds.length>S.renderCount?`<button class="more-btn" data-focus>${t("loadMore")} · ${fmt(chIds.length-S.renderCount)}</button>`:""}</div>`;}
  if(cos.length){h+=`<div class="section"><div class="sec-head"><span class="ic">${icGlobe()}</span><h2>${t("searchCo")}</h2></div>${countryGrid(cos)}</div>`;}
  return h;
}

function renderCountry(){
  const code=S.country, c=S.countries[code], all=S.byCountry[code]||[];
  $("#crumbs").innerHTML=`<button class="crumb-btn" data-act="back" data-focus>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>${t("back")}</button>
    <span class="crumb-sep">/</span><span class="crumb-here"><span class="flag">${c.flag||"🌐"}</span>${esc(c.name)}</span>`;
  const cats=["all",...[...(S.catsByCountry[code]||[])].sort()];
  const chips=`<div class="chips">${cats.map(cat=>`<button class="chip" data-cat="${esc(cat)}" data-focus aria-pressed="${S.cat===cat}">${cat==="all"?t("allCats"):cap(cat)}</button>`).join("")}</div>`;
  const q=S.q;
  let list=all.filter(id=>{const ch=S.channels[id];
    if(S.cat!=="all"&&!(ch.categories||[]).includes(S.cat))return false;
    if(q)return ch.name.toLowerCase().includes(q)||(ch.alt_names||[]).some(n=>n.toLowerCase().includes(q));
    return true;});
  S.lastList=list;
  const head=`<div class="hero" style="padding:30px 30px"><div class="hero-in"><div class="kicker"><span class="dot"></span>${c.flag||"🌐"} ${esc(code==="_INT"?"INT":code)}</div><h1>${esc(c.name)}</h1><p>${t("countrySub")(all.length)}</p></div></div>`;
  let grid;
  if(!list.length) grid=`<div class="state"><div class="emoji">📺</div><h3>${t("noChT")}</h3><p>${t("noChD")}</p></div>`;
  else{const shown=list.slice(0,S.renderCount);
    grid=`<div class="ch-grid">${shown.map(channelCard).join("")}</div>${list.length>S.renderCount?`<button class="more-btn" data-focus>${t("loadMore")} · ${fmt(list.length-S.renderCount)}</button>`:""}`;}
  $("#content").innerHTML=head+chips+grid; afterRender();
}

function renderFavorites(){
  $("#crumbs").innerHTML=`<button class="crumb-btn" data-act="back" data-focus>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>${t("back")}</button>
    <span class="crumb-sep">/</span><span class="crumb-here">⭐ ${t("favorites")}</span>`;
  let ids=[...S.fav].filter(id=>S.channels[id]);
  if(S.q)ids=ids.filter(id=>S.channels[id].name.toLowerCase().includes(S.q));
  S.lastList=ids;
  if(!ids.length){$("#content").innerHTML=`<div class="state"><div class="emoji">⭐</div><h3>${t("favEmptyT")}</h3><p>${t("favEmptyD")}</p></div>`;afterRender();return;}
  $("#content").innerHTML=`<div class="ch-grid">${ids.map(channelCard).join("")}</div>`; afterRender();
}

/* ----- builders ----- */
function countryList(){return Object.keys(S.byCountry).map(code=>({code,c:S.countries[code],n:S.byCountry[code].length}))
  .filter(x=>x.c).sort((a,b)=>b.n-a.n||a.c.name.localeCompare(b.c.name));}
function countryGrid(items){if(!items.length)return `<div class="state"><div class="emoji">🌐</div><h3>${t("searchEmptyT")}</h3></div>`;
  return `<div class="country-grid">${items.map(({code,c,n})=>`<button class="country-card" data-code="${esc(code)}" data-focus>
    <span class="c-code">${esc(code==="_INT"?"INT":code)}</span><span class="flag">${c.flag||"🌐"}</span>
    <span class="c-name">${esc(c.name)}</span><span class="c-count">${t("chCount")(n)}</span></button>`).join("")}</div>`;}
function popularChips(){const set=new Set(POPULAR);const list=countryList().filter(x=>set.has(x.code));
  const ordered=POPULAR.map(code=>list.find(x=>x.code===code)).filter(Boolean);
  return ordered.map(({code,c,n})=>`<button class="pop" data-code="${esc(code)}" data-focus><span class="flag">${c.flag||"🌐"}</span>${esc(c.name)}<span class="n">${n}</span></button>`).join("");}
function railSection(id,title,ic,ids){return `<div class="section"><div class="sec-head"><span class="ic">${ic}</span><h2>${title}</h2></div>
  <div class="rail">${ids.map(miniCard).join("")}</div></div>`;}
function miniCard(id){const ch=S.channels[id];return `<button class="mini" data-id="${esc(id)}" data-focus>
  <span class="m-logo">${logoHTML(id,ch.name)}</span><span class="m-name">${esc(ch.name)}</span></button>`;}
function channelCard(id){const ch=S.channels[id];const streams=S.streamsByCh[id]||[];const best=streams.slice().sort(qRank)[0];
  const cat=(ch.categories&&ch.categories[0])||"";const geo=streams.some(s=>s.label);const on=S.fav.has(id);
  return `<button class="card" data-id="${esc(id)}" data-focus>
    <span class="card-live">● ${t("live")}</span>
    <span class="card-logo">${logoHTML(id,ch.name)}</span>
    <span class="card-body"><span class="card-name">${esc(ch.name)}</span>
      <span class="card-sub">${best&&best.quality?`<span class="badge">${esc(best.quality)}</span>`:""}${cat?`<span class="badge cat">${cap(cat)}</span>`:""}${geo?`<span class="badge warnb">${t("geo")}</span>`:""}</span></span>
    <span class="fav-btn ${on?"on":""}" data-fav="${esc(id)}" aria-label="Favori">${icStar(on)}</span></button>`;}
function logoHTML(id,name){const url=S.logoByCh[id];
  if(url)return `<img src="${esc(url)}" alt="" loading="lazy" onerror="this.outerHTML='<span class=\\'initials\\' style=\\'background:${hue(name)}\\'>${esc(initials(name))}</span>'">`;
  return `<span class="initials" style="background:${hue(name)}">${esc(initials(name))}</span>`;}

function afterRender(){syncSearch();}

/* ===================== Favorites / recents ===================== */
function toggleFav(id,fromPlayer){
  if(!id)return;
  if(S.fav.has(id)){S.fav.delete(id);toast(t("removed"));}else{S.fav.add(id);toast(t("added"));}
  localStorage.setItem("izl:fav",JSON.stringify([...S.fav]));
  if(fromPlayer)$("#pFav").classList.toggle("on",S.fav.has(id));
  // update visible card stars without full re-render where possible
  document.querySelectorAll(`[data-fav="${cssEsc(id)}"]`).forEach(el=>{el.classList.toggle("on",S.fav.has(id));el.innerHTML=icStar(S.fav.has(id));});
  if(S.view==="favorites"||(S.view==="home"&&!S.q))render();
}
function pushRecent(id){S.recents=[id,...S.recents.filter(x=>x!==id)].slice(0,20);localStorage.setItem("izl:recents",JSON.stringify(S.recents));}

/* ===================== Player ===================== */
let hls=null,curStreams=[],curIdx=0,curChannel=null,curPlIdx=0;
function openPlayer(id){
  curChannel=S.channels[id]; if(!curChannel)return;
  curPlIdx=Math.max(0,S.lastList.indexOf(id));
  loadChannel(id);
  $("#scrim").classList.add("open"); document.body.style.overflow="hidden";
  $("#pClose").focus();
}
function loadChannel(id){
  curChannel=S.channels[id];
  curStreams=(S.streamsByCh[id]||[]).slice().sort(qRank); curIdx=0;
  pushRecent(id);
  $("#pName").textContent=curChannel.name;
  const cats=(curChannel.categories||[]).map(cap).join(", ");
  $("#pMeta").textContent=[S.countries[curChannel.country]?.name,cats].filter(Boolean).join(" · ");
  $("#pLogo").innerHTML=logoHTML(id,curChannel.name);
  $("#pFav").classList.toggle("on",S.fav.has(id));
  renderZap(); renderSources();
  if(!curStreams.length){overlay({emoji:"📭",title:t("noStream"),desc:"",actions:[]});return;}
  play(curIdx);
}
function renderZap(){
  const el=$("#zap");
  if(S.lastList.length<=1){el.innerHTML="";return;}
  el.innerHTML=`<button id="zPrev" data-focus><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>${t("prevCh")}</button>
    <button id="zNext" data-focus>${t("nextCh")}<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>`;
  $("#zPrev").onclick=()=>zap(-1); $("#zNext").onclick=()=>zap(1);
}
function zap(dir){if(!S.lastList.length)return;curPlIdx=(curPlIdx+dir+S.lastList.length)%S.lastList.length;loadChannel(S.lastList[curPlIdx]);}
function renderSources(){
  const el=$("#sources");
  if(curStreams.length<=1&&!(curStreams[0]&&curStreams[0].label)){el.innerHTML="";return;}
  el.innerHTML=`<div class="sources-label">${t("sources")}</div><div class="src-row">${curStreams.map((s,i)=>`
    <button class="src-chip" data-i="${i}" data-focus aria-pressed="${i===curIdx}"><span class="q">${esc(s.quality||"AUTO")}</span><span class="l">${esc(s.label||s.title||("#"+(i+1)))}</span></button>`).join("")}</div>`;
  el.querySelectorAll(".src-chip").forEach(b=>b.onclick=()=>{curIdx=+b.dataset.i;renderSources();play(curIdx);});
}
function play(i){
  const st=curStreams[i]; if(!st)return; curIdx=i; renderSources();
  const video=$("#video"); destroyHls(); video.removeAttribute("src"); try{video.load();}catch(e){}
  overlay({spin:true,title:t("starting"),desc:"",actions:[]});
  const url=st.url, insecure=url.startsWith("http://")&&location.protocol==="https:";
  const onFail=()=>overlay({emoji:"📡",title:t("errT"),desc:insecure?t("httpD"):t("errD"),actions:playerActions()});
  video.addEventListener("playing",()=>overlay(null),{once:true});
  if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src=url; video.addEventListener("error",onFail,{once:true}); video.play().catch(()=>{});
  }else if(window.Hls&&Hls.isSupported()){
    hls=new Hls({maxBufferLength:20,manifestLoadingMaxRetry:2,fragLoadingMaxRetry:2,levelLoadingMaxRetry:2});
    hls.loadSource(url); hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR,(_e,d)=>{if(d.fatal)onFail();});
  }else onFail();
}
function playerActions(){const a=[];if(curStreams.length>1)a.push({label:t("nextSrc"),primary:true,fn:()=>play((curIdx+1)%curStreams.length)});
  a.push({label:t("retry"),fn:()=>play(curIdx)});a.push({label:t("copy"),fn:()=>copy(curStreams[curIdx].url)});return a;}
function overlay(o){const ov=$("#vOverlay");if(!o){ov.classList.remove("show");return;}
  $("#vSpin").style.display=o.spin?"":"none";$("#vEmoji").classList.toggle("hidden",!o.emoji);$("#vEmoji").textContent=o.emoji||"";
  $("#vTitle").textContent=o.title||"";$("#vDesc").textContent=o.desc||"";
  const act=$("#vActions");act.innerHTML="";(o.actions||[]).forEach(x=>{const b=document.createElement("button");b.textContent=x.label;b.setAttribute("data-focus","");if(x.primary)b.className="primary";b.onclick=x.fn;act.appendChild(b);});
  ov.classList.add("show");}
function closePlayer(){destroyHls();const v=$("#video");v.pause();v.removeAttribute("src");try{v.load();}catch(e){}
  $("#scrim").classList.remove("open");document.body.style.overflow="";}
function destroyHls(){if(hls){try{hls.destroy();}catch(e){}hls=null;}}
async function togglePip(){const v=$("#video");try{if(document.pictureInPictureElement)await document.exitPictureInPicture();
  else if(v.requestPictureInPicture)await v.requestPictureInPicture();else toast(t("pipErr"));}catch(e){toast(t("pipErr"));}}
function toggleFull(){const w=$("#video").parentElement;if(document.fullscreenElement)document.exitFullscreen();
  else (w.requestFullscreen||$("#video").webkitEnterFullscreen||(()=>{})).call(w.requestFullscreen?w:$("#video"));}

/* ===================== Spatial navigation (TV remote) ===================== */
function setupSpatialNav(){
  document.addEventListener("keydown",e=>{
    const open=$("#scrim").classList.contains("open");
    if(e.key==="Escape"){if(open)closePlayer();return;}
    if(e.key==="/"&&!isTyping()){e.preventDefault();$("#search").focus();return;}
    if(e.key==="Enter"&&!isTyping()){const a=document.activeElement;if(a&&a.hasAttribute("data-focus")&&a.tagName!=="BUTTON"){e.preventDefault();a.click();}return;}
    const dirs={ArrowUp:"up",ArrowDown:"down",ArrowLeft:"left",ArrowRight:"right"};
    if(!(e.key in dirs))return;
    if(isTyping()){if(e.key==="ArrowDown"){e.preventDefault();firstFocusable()?.focus();}return;}
    e.preventDefault(); navDir(dirs[e.key]);
  });
}
function isTyping(){const a=document.activeElement;return a&&(a.tagName==="INPUT"||a.tagName==="TEXTAREA");}
function focusables(){const scope=$("#scrim").classList.contains("open")?$("#scrim"):document;
  return [...scope.querySelectorAll("[data-focus]")].filter(el=>el.offsetParent!==null&&!el.disabled&&el.getClientRects().length);}
function firstFocusable(){const els=focusables();const grid=els.find(el=>el.classList.contains("card")||el.classList.contains("country-card")||el.classList.contains("pop")||el.classList.contains("mini"));return grid||els[0];}
function navDir(dir){
  const els=focusables(); if(!els.length)return;
  const cur=document.activeElement;
  if(!els.includes(cur)){els[0].focus();return;}
  const r=cur.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  let best=null,bestScore=Infinity;
  for(const el of els){if(el===cur)continue;const b=el.getBoundingClientRect(),bx=b.left+b.width/2,by=b.top+b.height/2,dx=bx-cx,dy=by-cy;
    if(dir==="left"&&dx>-2)continue;if(dir==="right"&&dx<2)continue;if(dir==="up"&&dy>-2)continue;if(dir==="down"&&dy<2)continue;
    const along=(dir==="left"||dir==="right")?Math.abs(dx):Math.abs(dy);
    const cross=(dir==="left"||dir==="right")?Math.abs(dy):Math.abs(dx);
    const score=along+cross*2.4; if(score<bestScore){bestScore=score;best=el;}}
  if(best){best.focus();best.scrollIntoView({block:"nearest",inline:"nearest"});}
}

/* ===================== Helpers ===================== */
function qRank(a,b){const r=q=>{const m=/(\d{3,4})/.exec(q&&q.quality||"");return m?+m[1]:0;};return r(b)-r(a);}
function initials(name){const w=name.replace(/[^\p{L}\p{N} ]/gu,"").trim().split(/\s+/).filter(Boolean);if(!w.length)return"TV";return (w[0][0]+(w[1]?w[1][0]:(w[0][1]||""))).toUpperCase();}
function hue(name){let h=0;for(let i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))>>>0;return `linear-gradient(135deg,hsl(${h%360} 64% 54%),hsl(${(h*7)%360} 60% 44%))`;}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function fmt(n){return n.toLocaleString(S.lang==="tr"?"tr-TR":"en-US");}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function cssEsc(s){return String(s).replace(/["\\]/g,"\\$&");}
function debounce(fn,ms){let id;return(...a)=>{clearTimeout(id);id=setTimeout(()=>fn(...a),ms);};}
function copy(text){(navigator.clipboard?.writeText(text)||Promise.reject()).then(()=>toast(t("copied")))
  .catch(()=>{const i=document.createElement("input");i.value=text;document.body.appendChild(i);i.select();try{document.execCommand("copy");toast(t("copied"));}catch(e){}i.remove();});}
let toastId;function toast(m){const el=$("#toast");el.textContent=m;el.classList.add("show");clearTimeout(toastId);toastId=setTimeout(()=>el.classList.remove("show"),1900);}
/* icons */
function icStar(on){return `<svg width="15" height="15" viewBox="0 0 24 24" fill="${on?"currentColor":"none"}" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="m12 17.3-6.2 3.6 1.7-7L2 9.2l7.1-.6L12 2l2.9 6.6 7.1.6-5.5 4.7 1.7 7z"/></svg>`;}
function icGlobe(){return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>`;}
function icPlay(){return `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;}
function icTv(){return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2.5"/><path d="M17 2l-5 5-5-5"/></svg>`;}
</script>
