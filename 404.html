<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>İzliyos</title>
<!-- GitHub Pages SPA fallback (rafgraph/spa-github-pages technique).
     Redirects deep links like /country/TR back into index.html so the
     in-app router can handle them.
     pathSegmentsToKeep = 0  -> custom domain or user site (izliyos.com, user.github.io)
     pathSegmentsToKeep = 1  -> project page (user.github.io/repo)  (must match BASE) -->
<script>
  var pathSegmentsToKeep = 0;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
